    desc:"24 февраля 2022 года Россия начала масштабные военные действия на территории Украины, нанося удары по многим городам страны одновременно. Украинские вооружённые силы оказали организованное сопротивление. Конфликт быстро превратился в затяжную войну с применением всех видов вооружений. Миллионы украинцев были вынуждены покинуть свои дома.",
    sig:"Это крупнейший вооружённый конфликт в Европе со времён Второй мировой войны. Западные государства ввели против России беспрецедентные по масштабу санкции. Война кардинально изменила архитектуру европейской безопасности, ускорила расширение НАТО и поставила под сомнение сложившийся после 1991 года международный порядок."
  }
];

const epochs = ["1990-е","2000-е","2010-е","2020-е"];
let currentFilter = "all";

function render() {
  const container = document.getElementById("tl-container");
  container.innerHTML = "";

  epochs.forEach(ep => {
    const epEvents = events.filter(e => e.epoch === ep);
    const visibleInEpoch = epEvents.filter(e => currentFilter === "all" || e.type === currentFilter);
    if (visibleInEpoch.length === 0) return;

    const label = document.createElement("div");
    label.className = "epoch-label";
    label.textContent = ep;
    container.appendChild(label);

    const track = document.createElement("div");
    track.className = "tl-track";

    epEvents.forEach(ev => {
      const item = document.createElement("div");
      item.className = "tl-item" + (currentFilter !== "all" && ev.type !== currentFilter ? " hidden" : "");
      item.dataset.type = ev.type;

      const dot = document.createElement("div");
      dot.className = "tl-dot " + ev.type;
      dot.onclick = () => toggleCard(card);

      const card = document.createElement("div");
      card.className = "tl-card";
      card.innerHTML = `
        <div class="tl-head">
          <span class="tl-year ${ev.type}">${ev.year}</span>
          <span class="tl-title">${ev.title}</span>
          <span class="tl-chevron">▼</span>
        </div>
        <div class="tl-body">
          <p class="tl-desc">${ev.desc}</p>
          <div class="tl-sig-label">Историческое значение</div>
          <p class="tl-sig ${ev.type}">${ev.sig}</p>
          <div class="tl-num">Событие ${ev.id} из ${events.length}</div>
        </div>`;

      card.querySelector(".tl-head").onclick = () => toggleCard(card);

      item.appendChild(dot);
      item.appendChild(card);
      track.appendChild(item);
    });

    container.appendChild(track);
  });
}

function toggleCard(card) {
  card.classList.toggle("open");
}

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll(".f-btn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  render();
}

render();
</script>
